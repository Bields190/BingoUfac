            <div class="area-input-pedra">

                <div class="botoes-form">
                    <button type="submit" class="botao-acao botao-marcar">
                        Marcar
                    </button>
                    <button type="button" class="botao-acao botao-excluir" id="btnExcluirDigitado">
                        Excluir
                    </button>
                </div>
            </div>
        </form>

        <div class="area-botoes-gerais">
            <button class="botao-geral botao-desfazer" id="btnDesfazer">

            <button class="botao-geral botao-limpar" id="btnLimparSorteados">
